project:
  pre-render:
    - "python generate_quarto_nav.py nodes.csv --yml-out _quarto.yml --create-stubs --sidebar-style docked --sidebar-background light --logo assets/NESBp_logo.png"
  resources:
    - nodes.csv
    - page_content.csv
    - assets/NESBp_logo.png
  type: website

execute:
  freeze: auto

